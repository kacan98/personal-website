name: PR Checks

on:
  pull_request:
    branches: [master, main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate project metadata
        run: npm run validate:projects

      - name: Validate localized project parity
        run: npm run validate:localized-projects

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint
